# HTTP → HTTPS 강제 리다이렉트
server {
    listen 80;
    server_name localhost;

    # 헬스체크 전용 (busybox wget은 TLS 미지원이므로 HTTP로 점검)
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (TLS 1.2+) 서버
server {
    listen 443 ssl;
    server_name localhost;

    # TLS 인증서 (docker-compose에서 /etc/nginx/certs 로 마운트)
    ssl_certificate     /etc/nginx/certs/flowdesk.crt;
    ssl_certificate_key /etc/nginx/certs/flowdesk.key;
    ssl_protocols       TLSv1.2 TLSv1.3;          # 1.1 이하 비활성
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (1년, 서브도메인 포함) — HTTPS 응답에서만 발효
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA 라우팅 지원
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 요청을 백엔드로 프록시
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO WebSocket 프록시 (채팅 실시간 기능)
    location /socket.io/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # 파일 업로드 다운로드 경로
    # ^~ : 이 prefix가 매칭되면 아래 정적 캐싱 정규식(location ~* \.(png|jpg...))보다
    #      우선하도록 강제한다. 없으면 이미지 첨부(.png 등)가 정규식에 잡혀 404가 난다.
    location ^~ /uploads/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 정적 파일 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
